<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Payment Failed - Sinan Han Hotel</title>
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg max-w-md w-full p-8 text-center">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Payment Failed</h1>
        <p class="text-gray-500 mb-2">Your payment could not be processed.</p>
        <p id="order-info" class="text-sm text-gray-400 mb-8"></p>
        <p class="text-sm text-gray-500 mb-8">No charge has been made. Please try again or contact us at <a href="mailto:about@hotelsinanhan.com" class="text-indigo-600">about@hotelsinanhan.com</a> for assistance.</p>
        <a href="/" class="inline-block bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors">
            Try Again
        </a>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const orderNumber = params.get('order_number');
        if (orderNumber) {
            document.getElementById('order-info').textContent = 'Order #' + orderNumber;
        }
    </script>
</body>
</html>

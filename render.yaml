services:
  - type: web
    name: sinan-han-hotel
    env: node
    rootDir: .
    buildCommand: npm install --omit=dev && node scripts/minify-js.js && node scripts/minify-css.js
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
